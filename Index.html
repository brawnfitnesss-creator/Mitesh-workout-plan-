/* ── LOG TYPE ────────────────────────────────────────────────────── */
const exLogType=(blk,ex)=>{
  if(blk.wod)return'wod';
  const n=ex.n.toLowerCase(),r=(ex.r||"").toLowerCase();
  if(n.includes('treadmill')||n.includes('cross trainer')||n.includes('sprint')||n.includes('200 m')||n.includes('400 m')||n.includes('500 m'))return'cardio';
  if(n.includes('carry')||n.includes("farmer"))return'carry';
  if(r.includes(' s')||r.includes('sec')||n.includes('hold')||n.includes('l-sit')||n.includes('plank')||n.includes('hollow'))return'timed';
  if(n.includes('push-up')||n.includes('burpee')||n.includes('mountain climb')||n.includes('v-up')||n.includes('dead bug'))return'bw';
  return'lift';
};

/* ── HELPERS ─────────────────────────────────────────────────────── */
const logSummary=(le,lt)=>{
  if(!le)return null;
  if(lt==='lift'||lt==='bw'){
    const parts=(le.sets||[]).filter(s=>s&&(s.w||s.r)).map(s=>s.w&&s.r?`${s.w}kg×${s.r}`:s.r?`${s.r}r`:s.w?`${s.w}kg`:null).filter(Boolean);
    return parts.length?parts.join(' · '):null;
  }
  if(lt==='timed'){const p=(le.sets||[]).filter(s=>s&&s.t).map(s=>`${s.t}s`);return p.length?p.join(' · '):null;}
  if(lt==='cardio'){const p=[];if(le.dist)p.push(`${le.dist}m`);if(le.time)p.push(le.time);return p.length?p.join(' @ '):null;}
  if(lt==='carry'){const p=(le.sets||[]).filter(s=>s&&(s.w||s.dist)).map(s=>{const a=[];if(s.w)a.push(`${s.w}kg`);if(s.dist)a.push(`${s.dist}m`);return a.join('/')}).filter(Boolean);return p.length?p.join(' · '):null;}
  if(lt==='wod'){const p=[];if(le.rounds)p.push(`${le.rounds} rds`);if(le.time)p.push(le.time);if(le.weight)p.push(`@${le.weight}kg`);return p.length?p.join(' · '):null;}
  return null;
};
const inp=(w='60px')=>({width:w,background:T.raise,border:`1px solid ${T.faint}`,borderRadius:6,padding:"5px 6px",color:T.text,fontSize:11,textAlign:"center",boxSizing:"border-box"});

/* ── RING ─────────────────────────────────────────────────────────── */
const Ring=({pct,col,size=52,stroke=5})=>{
  const r=(size-stroke*2)/2,cx=size/2,cy=size/2,circ=2*Math.PI*r,dash=(pct/100)*circ;
  return(
    <svg width={size} height={size} style={{flexShrink:0}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={T.faint} strokeWidth={stroke}/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={col} strokeWidth={stroke}
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
        transform={`rotate(-90 ${cx} ${cy})`}/>
      <text x={cx} y={cy+4} textAnchor="middle" fill={pct===100?col:T.text}
        fontSize={pct===100?"11":"12"} fontWeight="700" fontFamily="system-ui">
        {pct===100?"✓":`${pct}%`}
      </text>
    </svg>
  );
};

  if(lt==='wod')return(
    <div style={{background:T.raise,borderRadius:"0 0 8px 8px",padding:"10px 12px",borderTop:`1px solid ${T.faint}`}}>
      <div style={{fontSize:9,color:T.muted,marginBottom:7,fontWeight:700,letterSpacing:.5}}>WOD LOG</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:7}}>
        <div><div style={{fontSize:9,color:T.muted,marginBottom:3}}>Rounds done</div>
          <input style={inpSt('64px')} placeholder="e.g. 4" value={le.rounds||""} onChange={e=>updateLog(bi,ei,"rounds",e.target.value)}/></div>
        <div><div style={{fontSize:9,color:T.muted,marginBottom:3}}>Time (mm:ss)</div>
          <input style={inpSt('72px')} placeholder="12:34" value={le.time||""} onChange={e=>updateLog(bi,ei,"time",e.target.value)}/></div>
        <div><div style={{fontSize:9,color:T.muted,marginBottom:3}}>Weight (kg)</div>
          <input style={inpSt('64px')} placeholder="kg" value={le.weight||""} onChange={e=>updateLog(bi,ei,"weight",e.target.value)}/></div>
      </div>
      <input style={{...inpSt("100%"),textAlign:"left"}} placeholder="Notes / feelings / PR..." value={le.notes||""} onChange={e=>updateLog(bi,ei,"notes",e.target.value)}/>
    </div>
  );
  if(lt==='cardio')return(
    <div style={{background:T.raise,borderRadius:"0 0 8px 8px",padding:"10px 12px",borderTop:`1px solid ${T.faint}`}}>
      <div style={{fontSize:9,color:T.muted,marginBottom:7,fontWeight:700,letterSpacing:.5}}>CARDIO LOG</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:7}}>
        <div><div style={{fontSize:9,color:T.muted,marginBottom:3}}>Distance (m)</div>
          <input style={inpSt('72px')} placeholder="400" value={le.dist||""} onChange={e=>updateLog(bi,ei,"dist",e.target.value)}/></div>
        <div><div style={{fontSize:9,color:T.muted,marginBottom:3}}>Time (mm:ss)</div>
          <input style={inpSt('72px')} placeholder="2:15" value={le.time||""} onChange={e=>updateLog(bi,ei,"time",e.target.value)}/></div>
        <div><div style={{fontSize:9,color:T.muted,marginBottom:3}}>Speed / Level</div>
          <input style={inpSt('72px')} placeholder="8 km/h" value={le.speed||""} onChange={e=>updateLog(bi,ei,"speed",e.target.value)}/></div>
      </div>
      <input style={{...inpSt("100%"),textAlign:"left"}} placeholder="Notes..." value={le.notes||""} onChange={e=>updateLog(bi,ei,"notes",e.target.value)}/>
    </div>
  );
  if(lt==='timed')return(
    <div style={{background:T.raise,borderRadius:"0 0 8px 8px",padding:"10px 12px",borderTop:`1px solid ${T.faint}`}}>
      <div style={{fontSize:9,color:T.muted,marginBottom:7,fontWeight:700,letterSpacing:.5}}>LOG HOLD TIMES</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:7}}>
        {Array.from({length:ex.s||1},(_,si)=>(
          <div key={si} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <div style={{fontSize:9,color:T.muted}}>Set {si+1}</div>
            <div style={{display:"flex",gap:4,alignItems:"center"}}>
              <input style={inpSt('48px')} placeholder="s" value={getSetLog(bi,ei,si).t||""} onChange={e=>updateLog(bi,ei,"t",e.target.value,si)}/>
              <span style={{fontSize:9,color:T.muted}}>s</span>
              <button onClick={()=>toggle(bi,ei,si)} style={{width:22,height:22,borderRadius:"50%",background:isChecked(bi,ei,si)?col:T.faint,border:"none",cursor:"pointer",color:"#fff",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>{isChecked(bi,ei,si)?"✓":""}</button>
            </div>
          </div>
        ))}
      </div>
      <input style={{...inpSt("100%"),textAlign:"left"}} placeholder="Notes..." value={le.notes||""} onChange={e=>updateLog(bi,ei,"notes",e.target.value)}/>
    </div>
  );
  if(lt==='carry')return(
    <div style={{background:T.raise,borderRadius:"0 0 8px 8px",padding:"10px 12px",borderTop:`1px solid ${T.faint}`}}>
      <div style={{fontSize:9,color:T.muted,marginBottom:7,fontWeight:700,letterSpacing:.5}}>LOG CARRY SETS</div>
      {Array.from({length:ex.s||1},(_,si)=>(
        <div key={si} style={{display:"flex",gap:7,alignItems:"center",marginBottom:7}}>
          <div style={{fontSize:10,color:T.muted,width:38,flexShrink:0}}>Set {si+1}</div>
          <input style={inpSt('54px')} placeholder="kg" value={getSetLog(bi,ei,si).w||""} onChange={e=>updateLog(bi,ei,"w",e.target.value,si)}/>
          <span style={{fontSize:9,color:T.muted}}>kg</span>
          <input style={inpSt('48px')} placeholder="m" value={getSetLog(bi,ei,si).dist||""} onChange={e=>updateLog(bi,ei,"dist",e.target.value,si)}/>
          <span style={{fontSize:9,color:T.muted}}>m</span>
          <button onClick={()=>toggle(bi,ei,si)} style={{width:26,height:26,borderRadius:"50%",background:isChecked(bi,ei,si)?col:T.faint,border:"none",cursor:"pointer",color:"#fff",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{isChecked(bi,ei,si)?"✓":si+1}</button>
        </div>
      ))}
      <input style={{...inpSt("100%"),textAlign:"left"}} placeholder="Notes..." value={le.notes||""} onChange={e=>updateLog(bi,ei,"notes",e.target.value)}/>
    </div>
  );
  /* lift / bw */
  return(
    <div style={{background:T.raise,borderRadius:"0 0 8px 8px",padding:"10px 12px",borderTop:`1px solid ${T.faint}`}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
        <div style={{fontSize:9,color:T.muted,fontWeight:700,letterSpacing:.5}}>LOG SETS — Target: {ex.r}</div>
        {lt==='bw'&&<div style={{fontSize:9,color:T.muted}}>bodyweight</div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"34px 1fr 1fr 28px",gap:5,marginBottom:5}}>
        <div/><div style={{fontSize:9,color:T.muted,textAlign:"center"}}>{lt==='bw'?"BW/Assist":"kg"}</div>
        <div style={{fontSize:9,color:T.muted,textAlign:"center"}}>Reps</div>
        <div style={{fontSize:9,color:T.muted,textAlign:"center"}}>✓</div>
      </div>
      {Array.from({length:ex.s||1},(_,si)=>{
        const sl=getSetLog(bi,ei,si),done=isChecked(bi,ei,si);
        return(
          <div key={si} style={{display:"grid",gridTemplateColumns:"34px 1fr 1fr 28px",gap:5,marginBottom:6,alignItems:"center"}}>
            <div style={{fontSize:10,color:done?col:T.muted,fontWeight:700}}>S{si+1}</div>
            <input style={{...inpSt("100%"),borderColor:sl.w?`${col}66`:T.faint}} placeholder={lt==='bw'?"BW":"kg"} value={sl.w||""} onChange={e=>updateLog(bi,ei,"w",e.target.value,si)}/>
            <input style={{...inpSt("100%"),borderColor:sl.r?`${col}66`:T.faint}} placeholder={ex.r} value={sl.r||""} onChange={e=>updateLog(bi,ei,"r",e.target.value,si)}/>
            <button onClick={()=>toggle(bi,ei,si)} style={{width:26,height:26,borderRadius:"50%",background:done?col:T.faint,border:`2px solid ${done?col:T.faint}`,cursor:"pointer",color:"#fff",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{done?"✓":""}</button>
          </div>
        );
      })}
      <input style={{...inpSt("100%"),textAlign:"left",marginTop:4}} placeholder="Notes / RPE / feeling..." value={le.notes||""} onChange={e=>updateLog(bi,ei,"notes",e.target.value)}/>
    </div>
  );
};

/* ── MAIN APP ─────────────────────────────────────────────────────── */
function App(){
  const [view,setView]=useState("dash");
  const [selWeek,setSelWeek]=useState(1);
  const [selSess,setSelSess]=useState(null);
  const [prog,setProg]=useState({});
  const [ready,setReady]=useState(false);
  const [toast,setToast]=useState(null);
  const [dateVal,setDateVal]=useState("");
  const [expandMob,setExpandMob]=useState(false);
  const [expandCool,setExpandCool]=useState(false);
  const [expandedEx,setExpandedEx]=useState({});
  const [showReset,setShowReset]=useState(false);
  const [sessNotes,setSessNotes]=useState({});

  useEffect(()=>{
    try{const d=localStorage.getItem("mitesh-v4");if(d){const p=JSON.parse(d);setProg(p.prog||{});setSessNotes(p.notes||{});}}catch{}
    setReady(true);
  },[]);
  useEffect(()=>{
    if(ready)try{localStorage.setItem("mitesh-v4",JSON.stringify({prog,notes:sessNotes}));}catch{}
  },[prog,sessNotes,ready]);

  const sk=(w,d)=>`w${w}-${d}`;
  const getSess=(w,d)=>PROG[`p${phaseOf(w)}${d}`];
  const todayStr=()=>new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});

  const toggle=(week,day,bi,ei,si)=>{
    const k=sk(week,day),ck=`${bi}-${ei}-${si}`;
    setProg(p=>({...p,[k]:{...p[k],ck:{...(p[k]?.ck||{}),[ck]:!p[k]?.ck?.[ck]}}}));
  };
  const isChecked=(week,day,bi,ei,si)=>!!prog[sk(week,day)]?.ck?.[`${bi}-${ei}-${si}`];

  const updateLog=(week,day,bi,ei,field,val,si)=>{
    const k=sk(week,day),ek=`${bi}-${ei}`;
    setProg(p=>{
      const ex=p[k]?.log?.[ek]||{};
      let up={...ex};
      if(si!==undefined){const sets=[...(ex.sets||[])];sets[si]={...(sets[si]||{}),[field]:val};up={...up,sets};}
      else up={...up,[field]:val};
      return{...p,[k]:{...p[k],log:{...(p[k]?.log||{}),[ek]:up}}};
    });
  };
  const getLog=(week,day,bi,ei)=>prog[sk(week,day)]?.log?.[`${bi}-${ei}`]||{};
  const getSetLog=(week,day,bi,ei,si)=>(prog[sk(week,day)]?.log?.[`${bi}-${ei}`]?.sets||[])[si]||{};

  const getProgress=(week,day)=>{
    const s=getSess(week,day);if(!s)return 0;
    const ck=prog[sk(week,day)]?.ck||{};
    let tot=0,hit=0;
    s.blocks.forEach((b,bi)=>b.ex.forEach((ex,ei)=>{for(let si=0;si<(ex.s||1);si++){tot++;if(ck[`${bi}-${ei}-${si}`])hit++;}}));
    return tot?Math.round((hit/tot)*100):0;
  };

  const markDone=(week,day)=>{
    const k=sk(week,day);
    setProg(p=>({...p,[k]:{...p[k],done:true,date:dateVal||todayStr()}}));
    showToast("✅ Session logged!");
  };
  const unmark=(week,day)=>{
    const k=sk(week,day);
    setProg(p=>({...p,[k]:{...p[k],done:false,date:undefined}}));
  };
  const resetSession=(week,day)=>{
    const k=sk(week,day);
    setProg(p=>({...p,[k]:{}}));
    setSessNotes(n=>({...n,[k]:""}));
    setShowReset(false);setExpandedEx({});
    showToast("🔄 Session reset");
  };
  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(null),2500);};

  const doneSessions=Object.values(prog).filter(p=>p?.done).length;

  const openSession=(week,day)=>{setSelSess({week,day});setExpandedEx({});setExpandMob(false);setExpandCool(false);setDateVal("");setShowReset(false);setView("session");};

  /* current week = first week with incomplete sessions */
  const currentWeek=Array.from({length:12},(_,i)=>i+1).find(w=>!["A","B","C"].every(d=>prog[sk(w,d)]?.done))||12;

  /* ── DASHBOARD ──────────────────────────────────────────────────── */
  if(view==="dash") return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:T.bg}}>
      <div style={{flex:1,overflowY:"auto",paddingBottom:64}}>
        {/* Header */}
        <div style={{background:"linear-gradient(135deg,#1A0D06,#0A0A14)",padding:"20px 16px 16px",borderBottom:`1px solid ${T.faint}`}}>
          <div style={{display:"flex",alignItems:"center",gap:13,marginBottom:14}}>
            <div style={{width:52,height:52,borderRadius:"50%",background:`linear-gradient(135deg,${T.p1},#FF3D3D)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:900,color:"#fff",flexShrink:0}}>M</div>
            <div>
              <div style={{fontSize:22,fontWeight:900,letterSpacing:1}}>MITESH</div>
              <div style={{fontSize:10,color:T.muted,marginTop:1}}>Intermediate · 3×/week · 1 hr · Early morning</div>
              <div style={{display:"flex",gap:5,marginTop:5,flexWrap:"wrap"}}>
                {["Shoulder Dev","Hip Mobility","Core","Neck Relief"].map(t=>(
                  <span key={t} style={{borderRadius:20,padding:"2px 7px",fontSize:9,fontWeight:600,background:T.faint,color:T.muted}}>{t}</span>
                ))}
              </div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            {[{v:doneSessions,l:"Done",col:T.ok},{v:36-doneSessions,l:"Left",col:T.muted},{v:`Wk ${currentWeek}`,l:"Current",col:T.p1},{v:`Ph ${phaseOf(currentWeek)}`,l:PC[phaseOf(currentWeek)].name,col:PC[phaseOf(currentWeek)].c}].map(({v,l,col})=>(
              <div key={l} style={{background:T.card,borderRadius:10,padding:"9px 6px",textAlign:"center"}}>
                <div style={{fontSize:17,fontWeight:900,color:col}}>{v}</div>
                <div style={{fontSize:9,color:T.muted,marginTop:1}}>{l}</div>
              </div>
            ))}
          </div>
        </div>

        <div style={{padding:"16px 16px 0"}}>
          {/* This week */}
          <div style={{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1,marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
            THIS WEEK — WK {currentWeek}
            <span style={{borderRadius:20,padding:"2px 7px",fontSize:9,fontWeight:700,background:`${PC[phaseOf(currentWeek)].c}22`,color:PC[phaseOf(currentWeek)].c}}>{PC[phaseOf(currentWeek)].name}</span>
          </div>
          {/* Week progress bar */}
          <div style={{height:4,background:T.faint,borderRadius:2,overflow:"hidden",marginBottom:10}}>
            <div style={{height:"100%",width:`${(["A","B","C"].filter(d=>prog[sk(currentWeek,d)]?.done).length/3)*100}%`,background:PC[phaseOf(currentWeek)].c,borderRadius:2,transition:"width .4s"}}/>
          </div>
          {["A","B","C"].map(d=>{
            const sess=getSess(currentWeek,d),pct=getProgress(currentWeek,d),done=!!prog[sk(currentWeek,d)]?.done,col=PC[phaseOf(currentWeek)].c;
            return(
              <button key={d} onClick={()=>openSession(currentWeek,d)}
                style={{background:done?`${col}11`:T.card,border:`1.5px solid ${done?col:pct>0?`${col}55`:T.faint}`,borderRadius:12,padding:"12px",cursor:"pointer",display:"flex",alignItems:"center",width:"100%",marginBottom:10,gap:11}}>
                <div style={{width:42,height:42,borderRadius:10,background:done?col:`${col}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{done?"✅":dayEmoji[d]}</div>
                <div style={{flex:1,textAlign:"left"}}>
                  <div style={{fontSize:11,fontWeight:700,color:done?col:T.text}}>Day {d} — {sess?.title}</div>
                  <div style={{fontSize:10,color:T.muted,marginTop:2}}>{sess?.sub}</div>
                  {done&&<div style={{fontSize:9,color:col,marginTop:2}}>✓ {prog[sk(currentWeek,d)]?.date}</div>}
                </div>
                <Ring pct={done?100:pct} col={col} size={46}/>
              </button>
            );
          })}

          {/* 12 week grid */}
          <div style={{marginTop:18}}>
            <div style={{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1,marginBottom:10}}>12-WEEK OVERVIEW</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
              {Array.from({length:12},(_,i)=>i+1).map(w=>{
                const ph=phaseOf(w),col=PC[ph].c,done=["A","B","C"].filter(d=>prog[sk(w,d)]?.done).length,isCur=w===currentWeek;
                return(
                  <button key={w} onClick={()=>{setSelWeek(w);setView("prog");}}
                    style={{background:done===3?`${col}22`:isCur?T.raise:T.card,border:`1.5px solid ${done===3?col:isCur?`${col}66`:T.faint}`,borderRadius:10,padding:"9px 5px",cursor:"pointer",textAlign:"center"}}>
                    <div style={{fontSize:9,color:T.muted,marginBottom:3}}>WK {w}</div>
                    <div style={{display:"flex",justifyContent:"center",gap:3,marginBottom:3}}>
                      {["A","B","C"].map(d=><div key={d} style={{width:7,height:7,borderRadius:"50%",background:prog[sk(w,d)]?.done?col:T.faint}}/>)}
                    </div>
                    <div style={{fontSize:9,color:done===3?col:T.muted}}>{done}/3</div>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      </div>
      <NavBar view={view} setView={setView} setSelWeek={setSelWeek}/>
      {toast&&<Toast msg={toast}/>}
    </div>
  );

  /* ── PROGRAM VIEW ────────────────────────────────────────────────── */
  if(view==="prog") return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:T.bg}}>
      <div style={{padding:"13px 16px 0",background:T.surf,borderBottom:`1px solid ${T.faint}`,flexShrink:0}}>
        <div style={{fontSize:12,fontWeight:800,letterSpacing:1,marginBottom:10}}>12-WEEK PROGRAM</div>
        <div style={{display:"flex",gap:7,marginBottom:11}}>
          {[1,2,3].map(p=>(
            <button key={p} onClick={()=>setSelWeek([1,5,9][p-1])}
              style={{flex:1,padding:"7px 4px",borderRadius:20,border:"none",background:phaseOf(selWeek)===p?PC[p].c:T.faint,color:phaseOf(selWeek)===p?"#fff":T.muted,fontSize:10,fontWeight:700,cursor:"pointer"}}>
              Ph{p} · {PC[p].name}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:12}}>
          {Array.from({length:12},(_,i)=>i+1).map(w=>{
            const col=PC[phaseOf(w)].c,done=["A","B","C"].filter(d=>prog[sk(w,d)]?.done).length;
            return(
              <button key={w} onClick={()=>setSelWeek(w)}
                style={{borderRadius:20,padding:"4px 10px",border:"none",background:selWeek===w?col:done===3?`${col}33`:T.faint,color:selWeek===w?"#fff":done===3?col:T.muted,flexShrink:0,fontWeight:700,fontSize:11,cursor:"pointer",minWidth:32}}>
                {w}
              </button>
            );
          })}
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"14px 16px 80px"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:PC[phaseOf(selWeek)].c}}/>
          <div style={{fontSize:10,fontWeight:700,color:PC[phaseOf(selWeek)].c,letterSpacing:.5}}>
            WEEK {selWeek} — {PC[phaseOf(selWeek)].name} · {PC[phaseOf(selWeek)].sub}
          </div>
        </div>
        {["A","B","C"].map(d=>{
          const sess=getSess(selWeek,d),pct=getProgress(selWeek,d),done=!!prog[sk(selWeek,d)]?.done,col=PC[phaseOf(selWeek)].c;
          return(
            <button key={d} onClick={()=>openSession(selWeek,d)}
              style={{background:done?`${col}11`:T.card,border:`1.5px solid ${done?col:pct>0?`${col}66`:T.faint}`,borderRadius:12,padding:"13px",cursor:"pointer",display:"flex",flexDirection:"column",width:"100%",marginBottom:12,gap:0}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:46,height:46,borderRadius:11,background:done?col:`${col}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{done?"✅":dayEmoji[d]}</div>
                <div style={{flex:1,textAlign:"left"}}>
                  <div style={{fontSize:11,fontWeight:800,color:done?col:T.text}}>Day {d} — {sess?.title}</div>
                  <div style={{fontSize:10,color:T.muted,marginTop:2}}>{sess?.sub}</div>
                  <div style={{display:"flex",gap:6,marginTop:5,flexWrap:"wrap"}}>
                    <span style={{borderRadius:20,padding:"2px 7px",fontSize:9,fontWeight:600,background:`${T.wod}22`,color:T.wod}}>{sess?.wod}</span>
                    {done&&<span style={{borderRadius:20,padding:"2px 7px",fontSize:9,fontWeight:600,background:`${col}22`,color:col}}>✓ {prog[sk(selWeek,d)]?.date}</span>}
                  </div>
                </div>
                <Ring pct={done?100:pct} col={col} size={50}/>
              </div>
              {pct>0&&!done&&(
                <div style={{marginTop:9}}>
                  <div style={{height:3,background:T.faint,borderRadius:2,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:col,borderRadius:2}}/>
                  </div>
                  <div style={{fontSize:9,color:T.muted,marginTop:3,textAlign:"left"}}>{pct}% checked</div>
                </div>
              )}
            </button>
          );
        })}
      </div>
      <NavBar view={view} setView={setView} setSelWeek={setSelWeek}/>
      {toast&&<Toast msg={toast}/>}
    </div>
  );

  /* ── SESSION VIEW ────────────────────────────────────────────────── */
  if(view==="session"&&selSess){
    const {week,day}=selSess;
    const sess=getSess(week,day);
    if(!sess)return null;
    const col=PC[phaseOf(week)].c,pct=getProgress(week,day),done=!!prog[sk(week,day)]?.done,sdKey=sk(week,day);
    const mkToggle=(bi,ei,si)=>toggle(week,day,bi,ei,si);
    const mkIsChecked=(bi,ei,si)=>isChecked(week,day,bi,ei,si);
    const mkUpdateLog=(bi,ei,field,val,si)=>updateLog(week,day,bi,ei,field,val,si);
    const mkGetLog=(bi,ei)=>getLog(week,day,bi,ei);
    const mkGetSetLog=(bi,ei,si)=>getSetLog(week,day,bi,ei,si);

    return(
      <div style={{display:"flex",flexDirection:"column",height:"100vh",background:T.bg}}>
        {/* sticky header */}
        <div style={{background:T.surf,borderBottom:`1px solid ${T.faint}`,padding:"11px 15px",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <button onClick={()=>{setView("prog");setShowReset(false);}} style={{background:"none",border:"none",color:T.muted,fontSize:12,cursor:"pointer",padding:0}}>← Back</button>
            <button onClick={()=>setShowReset(true)} style={{background:"none",border:`1px solid ${T.danger}55`,borderRadius:8,padding:"4px 10px",color:T.danger,fontSize:10,cursor:"pointer",fontWeight:600}}>🔄 Reset</button>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:11}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:4}}>
                <span style={{borderRadius:20,padding:"2px 7px",fontSize:9,fontWeight:700,background:`${col}22`,color:col}}>WK {week} · DAY {day}</span>
                <span style={{borderRadius:20,padding:"2px 7px",fontSize:9,fontWeight:700,background:`${T.wod}22`,color:T.wod}}>{sess.wod}</span>
                <span style={{borderRadius:20,padding:"2px 7px",fontSize:9,fontWeight:700,background:`${col}22`,color:col}}>{PC[phaseOf(week)].name}</span>
              </div>
              <div style={{fontSize:16,fontWeight:900,letterSpacing:.5}}>{sess.title}</div>
              <div style={{fontSize:10,color:T.muted,marginTop:1}}>{sess.sub}</div>
            </div>
            <Ring pct={done?100:pct} col={col} size={52}/>
          </div>
        </div>

        {/* scrollable body */}
        <div style={{flex:1,overflowY:"auto",padding:"12px 15px 20px"}}>
          {/* Warmup */}
          <div style={{background:T.card,borderRadius:10,padding:"10px 13px",marginBottom:12,borderLeft:`3px solid ${T.warn}`}}>
            <div style={{fontSize:10,fontWeight:700,color:T.warn,marginBottom:3}}>⚡ WARM-UP</div>
            <div style={{fontSize:10,color:T.muted,lineHeight:1.5}}>{sess.warmup}</div>
          </div>

          {/* Mobility */}
          <button onClick={()=>setExpandMob(e=>!e)}
            style={{display:"flex",alignItems:"center",gap:10,padding:"10px 13px",borderRadius:expandMob?"10px 10px 0 0":"10px",border:`1px solid ${T.mob}44`,borderBottom:expandMob?"none":undefined,background:`${T.mob}18`,width:"100%",cursor:"pointer",marginBottom:expandMob?0:12}}>
            <span style={{fontSize:14}}>🧘</span>
            <div style={{flex:1,textAlign:"left"}}><div style={{fontSize:11,fontWeight:800,color:T.mob}}>MOBILITY — 5 MIN</div><div style={{fontSize:9,color:T.muted}}>Hip + Neck · Every session · Non-negotiable</div></div>
            <span style={{color:T.mob,fontSize:13}}>{expandMob?"▲":"▼"}</span>
          </button>
          {expandMob&&(
            <div style={{background:T.card,borderRadius:"0 0 10px 10px",marginBottom:12,border:`1px solid ${T.mob}33`,borderTop:"none"}}>
              {MOB.map((ex,ei)=>(
                <div key={ei} style={{padding:"9px 13px",borderBottom:ei<MOB.length-1?`1px solid ${T.faint}`:undefined,display:"flex",gap:10,alignItems:"center"}}>
                  <button onClick={()=>mkToggle(-1,ei,0)} style={{width:24,height:24,borderRadius:"50%",background:mkIsChecked(-1,ei,0)?T.mob:T.faint,border:"none",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11}}>{mkIsChecked(-1,ei,0)?"✓":""}</button>
                  <div style={{flex:1}}><div style={{fontSize:10,fontWeight:700}}>{ex.n}</div><div style={{fontSize:9,color:T.muted}}>{ex.r} · {ex.c}</div></div>
                </div>
              ))}
            </div>
          )}

          {/* Blocks */}
          {sess.blocks.map((blk,bi)=>(
            <div key={bi} style={{marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 13px",borderRadius:"10px 10px 0 0",border:`1px solid ${blk.col}44`,borderBottom:"none",background:`${blk.col}18`}}>
                <span style={{fontSize:14}}>{blk.icon}</span>
                <div>
                  <div style={{fontSize:11,fontWeight:800,color:blk.col,letterSpacing:.5}}>{blk.nm}</div>
                  <div style={{fontSize:9,color:T.muted}}>{blk.wod?"Tap exercise to log rounds · time · weight":"Tap exercise row to log sets"}</div>
                </div>
              </div>
              <div style={{background:blk.wod?`${T.wod}09`:T.card,border:`1px solid ${blk.col}33`,borderTop:"none",borderRadius:"0 0 10px 10px",overflow:"hidden"}}>
                {blk.ex.map((ex,ei)=>{
                  const exKey=`${bi}-${ei}`,isOpen=!!expandedEx[exKey],lt=exLogType(blk,ex),le=mkGetLog(bi,ei),sm=logSummary(le,lt);
                  const allDone=!blk.wod&&Array.from({length:ex.s||1},(_,si)=>mkIsChecked(bi,ei,si)).every(Boolean);
                  return(
                    <div key={ei} style={{borderBottom:ei<blk.ex.length-1?`1px solid ${T.faint}`:undefined}}>
                      <div onClick={()=>setExpandedEx(prev=>({...prev,[exKey]:!prev[exKey]}))}
                        style={{padding:"10px 13px",cursor:"pointer",display:"flex",alignItems:"flex-start",gap:10,background:allDone?`${blk.col}0A`:undefined}}>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <div style={{fontSize:11,fontWeight:700,color:blk.wod?"#FFB3B3":allDone?blk.col:T.text}}>{ex.n}</div>
                            {allDone&&<span>✅</span>}
                          </div>
                          <div style={{fontSize:10,fontWeight:600,color:blk.col,marginTop:1}}>{!blk.wod?`${ex.s} × ${ex.r}`:ex.r}</div>
                          {sm&&<div style={{fontSize:9,color:T.ok,marginTop:2,fontWeight:600}}>📊 {sm}</div>}
                          <div style={{fontSize:9,color:T.muted,marginTop:2,lineHeight:1.4}}>{ex.c}</div>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
                          <span style={{fontSize:10,color:isOpen?blk.col:T.muted}}>{isOpen?"▲ close":"📝 log"}</span>
                          {blk.wod&&(
                            <button onClick={e=>{e.stopPropagation();mkToggle(bi,ei,0);}}
                              style={{width:30,height:30,borderRadius:8,background:mkIsChecked(bi,ei,0)?T.wod:T.faint,border:"none",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>
                              {mkIsChecked(bi,ei,0)?"✅":"☐"}
                            </button>
                          )}
                        </div>
                      </div>
                      {isOpen&&(
                        <div onClick={e=>e.stopPropagation()}>
                          <ExLogPanel week={week} day={day} bi={bi} ei={ei} ex={ex} blk={blk}
                            getLog={mkGetLog} getSetLog={mkGetSetLog}
                            updateLog={mkUpdateLog} toggle={mkToggle} isChecked={mkIsChecked}/>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}

          {/* Session notes */}
          <div style={{background:T.card,border:`1px solid ${T.faint}`,borderRadius:10,padding:"12px 13px",marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:6}}>📝 SESSION NOTES</div>
            <textarea value={sessNotes[sdKey]||""} onChange={e=>setSessNotes(n=>({...n,[sdKey]:e.target.value}))}
              placeholder="How did the session feel? PRs? Energy level? Coach notes..."
              style={{width:"100%",background:T.raise,border:`1px solid ${T.faint}`,borderRadius:8,padding:"8px 10px",color:T.text,fontSize:11,resize:"vertical",minHeight:68,lineHeight:1.5,outline:"none"}}/>
          </div>

          {/* Cool-down */}
          <button onClick={()=>setExpandCool(e=>!e)}
            style={{display:"flex",alignItems:"center",gap:10,padding:"10px 13px",borderRadius:expandCool?"10px 10px 0 0":"10px",border:`1px solid ${T.ok}44`,borderBottom:expandCool?"none":undefined,background:"#0D2A1A",width:"100%",cursor:"pointer",marginBottom:expandCool?0:12}}>
            <span style={{fontSize:13}}>🧊</span>
            <div style={{flex:1,textAlign:"left"}}><div style={{fontSize:11,fontWeight:800,color:T.ok}}>COOL-DOWN STRETCHES</div><div style={{fontSize:9,color:T.muted}}>Hip · Neck · Thoracic — 5 min</div></div>
            <span style={{color:T.ok,fontSize:13}}>{expandCool?"▲":"▼"}</span>
          </button>
          {expandCool&&(
            <div style={{background:T.card,borderRadius:"0 0 10px 10px",marginBottom:12,border:`1px solid ${T.ok}33`,borderTop:"none",padding:"10px 13px"}}>
              {sess.cool.map((c,i)=>(
                <div key={i} style={{fontSize:10,color:T.muted,padding:"5px 0",borderBottom:i<sess.cool.length-1?`1px solid ${T.faint}`:undefined}}>🌿 {c}</div>
              ))}
            </div>
          )}

          {/* Log / complete */}
          {!done?(
            <div style={{background:`linear-gradient(135deg,${col}18,${T.card})`,border:`1px solid ${col}44`,borderRadius:12,padding:"14px",marginBottom:8}}>
              <div style={{fontSize:11,fontWeight:700,color:col,marginBottom:10}}>✅ MARK SESSION COMPLETE</div>
              <input type="date" value={dateVal} onChange={e=>setDateVal(e.target.value)}
                style={{width:"100%",background:T.raise,border:`1px solid ${T.faint}`,borderRadius:8,padding:"8px 10px",color:T.text,fontSize:11,marginBottom:10}}/>
              <button onClick={()=>markDone(week,day)}
                style={{width:"100%",padding:"13px",background:col,border:"none",borderRadius:10,color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer",letterSpacing:.5}}>
                LOG SESSION
              </button>
              {pct<100&&<div style={{fontSize:9,color:T.muted,textAlign:"center",marginTop:7}}>{100-pct}% unchecked — you can still log!</div>}
            </div>
          ):(
            <div style={{background:`${T.ok}18`,border:`1px solid ${T.ok}44`,borderRadius:12,padding:"16px",textAlign:"center",marginBottom:8}}>
              <div style={{fontSize:22,marginBottom:5}}>✅</div>
              <div style={{fontSize:13,fontWeight:800,color:T.ok}}>SESSION COMPLETE</div>
              <div style={{fontSize:11,color:T.muted,marginTop:3}}>{prog[sdKey]?.date}</div>
              <button onClick={()=>unmark(week,day)} style={{marginTop:10,background:"none",border:`1px solid ${T.faint}`,borderRadius:8,padding:"5px 14px",color:T.muted,fontSize:10,cursor:"pointer"}}>Undo</button>
            </div>
          )}
        </div>

        <NavBar view={view} setView={setView} setSelWeek={setSelWeek}/>

        {/* Reset modal */}
        {showReset&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.78)",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
            <div style={{background:T.card,borderRadius:14,padding:22,maxWidth:320,width:"100%",border:`1px solid ${T.danger}44`}}>
              <div style={{fontSize:16,fontWeight:900,color:T.danger,marginBottom:8}}>Reset Session?</div>
              <div style={{fontSize:12,color:T.muted,lineHeight:1.6,marginBottom:18}}>
                This clears all checked sets, logged weights, reps, distances, and notes for <strong style={{color:T.text}}>Week {week} · Day {day}</strong>. Cannot be undone.
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setShowReset(false)} style={{flex:1,padding:12,background:T.faint,border:"none",borderRadius:10,color:T.text,fontSize:12,cursor:"pointer",fontWeight:600}}>Cancel</button>
                <button onClick={()=>resetSession(week,day)} style={{flex:1,padding:12,background:T.danger,border:"none",borderRadius:10,color:"#fff",fontSize:12,fontWeight:800,cursor:"pointer"}}>🔄 Reset</button>
              </div>
            </div>
          </div>
        )}
        {toast&&<Toast msg={toast}/>}
      </div>
    );
  }

  return null;
}

/* ── NAV BAR ──────────────────────────────────────────────────────── */
function NavBar({view,setView,setSelWeek}){
  return(
    <div style={{background:T.surf,borderTop:`1px solid ${T.faint}`,display:"flex",flexShrink:0}}>
      {[{id:"dash",icon:"🏠",label:"Home"},{id:"prog",icon:"📋",label:"Program"}].map(({id,icon,label})=>(
        <button key={id} onClick={()=>setView(id)}
          style={{flex:1,padding:"11px 0 14px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <span style={{fontSize:20}}>{icon}</span>
          <span style={{fontSize:9,color:view===id?T.p1:T.muted,fontWeight:view===id?700:400}}>{label}</span>
        </button>
      ))}
    </div>
  );
}

/* ── TOAST ────────────────────────────────────────────────────────── */
function Toast({msg}){
  return(
    <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:T.ok,color:"#fff",padding:"9px 18px",borderRadius:20,fontSize:12,fontWeight:700,zIndex:100,whiteSpace:"nowrap",pointerEvents:"none"}}>
      {msg}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
